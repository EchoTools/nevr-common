/**
 * Nevrcap v2 core capture format.
 *
 * Provides the timing envelope and file structure for VR session captures.
 * Game-specific payloads (starting with Echo Arena) are attached via oneof
 * extension points in CaptureHeader and Frame.
 *
 * Streaming format:
 *   1. One Envelope containing CaptureHeader
 *   2. N Envelopes containing Frame (e.g., 60 per second)
 *   3. One Envelope containing CaptureFooter (optional, for seekable files)
 */
syntax = "proto3";

package telemetry.v2;

import "google/protobuf/timestamp.proto";
import "telemetry/v2/echo_arena.proto";

option csharp_namespace = "Nevr.Telemetry.V2";
option go_package = "github.com/echotools/nevr-common/v4/gen/go/telemetry/v2;telemetryv2";
option java_multiple_files = true;
option java_outer_classname = "CaptureProto";
option java_package = "com.echotools.nevr.telemetry.v2";

/**
 * Top-level envelope for streaming v2 capture data.
 * Each message in a capture stream is wrapped in an Envelope.
 */
message Envelope {
  oneof message {
    // Core messages (1-9).
    CaptureHeader header = 1;
    Frame frame = 2;
    CaptureFooter footer = 3;
  }
}

/**
 * Session-scoped capture metadata.
 * Written once at the start of the stream.
 * Contains all constants that don't change during the session.
 */
message CaptureHeader {
  // Unique identifier for the capture (e.g., UUID).
  string capture_id = 1;

  // Unix epoch timestamp when the capture was created.
  // Used as the base for Frame.timestamp_offset_ms deltas.
  google.protobuf.Timestamp created_at = 2;

  // Format version (set to 2 for this revision).
  uint32 format_version = 3;

  // Arbitrary key-value metadata (game version, server IP, etc.).
  map<string, string> metadata = 4;

  // Game-specific header data.
  // Field numbers 10-99 reserved for game payloads.
  oneof game_header {
    EchoArenaHeader echo_arena = 10;
  }
}

/**
 * A single frame of capture data.
 * Follows the CaptureHeader in a stream.
 * Core overhead: ≤ 10 bytes (frame_index + timestamp_offset_ms).
 */
message Frame {
  // Sequential frame index, starting from 0.
  uint32 frame_index = 1;

  // Milliseconds since CaptureHeader.created_at.
  // Reduces 12-byte Timestamp to 1-5 byte varint.
  uint32 timestamp_offset_ms = 2;

  // Game-specific frame payload.
  // Field numbers 10-99 reserved for game payloads.
  oneof payload {
    EchoArenaFrame echo_arena = 10;
  }
}

/**
 * Capture footer with summary and index data.
 * Written once at the end of the stream for seekable files.
 * Optional — streaming consumers may never see this.
 */
message CaptureFooter {
  // Total number of frames in the capture.
  uint32 frame_count = 1;

  // Total duration of the capture in milliseconds.
  uint32 duration_ms = 2;

  // Total size of the capture in bytes (including header and footer).
  uint64 total_bytes = 3;

  // Keyframe index for random access.
  repeated KeyframeEntry keyframe_index = 4;

  // Event index for fast event lookup.
  repeated EventIndexEntry event_index = 5;
}

/**
 * Keyframe entry for random access into the capture stream.
 * Maps frame indices to byte offsets for seeking.
 */
message KeyframeEntry {
  // Frame index of the keyframe.
  uint32 frame_index = 1;

  // Byte offset of the keyframe in the stream.
  uint64 byte_offset = 2;
}

/**
 * Event index entry for fast event lookup.
 * Maps event types to the frames that contain them.
 */
message EventIndexEntry {
  // Frame index where the event occurred.
  uint32 frame_index = 1;

  // Event type identifier (matches EchoEvent oneof field name).
  string event_type = 2;
}
